<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* 🔒 Lock Screen */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* 🎉 Content */
#mainContent {
    display: none;
}

h1 {
    margin-top: 60px;
    font-size: 50px;
}

.name {
    font-size: 40px;
    color: #00ffd5;
}

/* 🎂 Cake */
.cake {
    margin-top: 50px;
    font-size: 100px;
    cursor: pointer;
    position: relative;
}

/* 🔪 Knife */
.knife {
    position: absolute;
    font-size: 50px;
    left: 50%;
    transform: translateX(-50%);
    top: -80px;
    opacity: 0;
}

/* Animation */
.cut .knife {
    opacity: 1;
    animation: slice 1s forwards;
}

@keyframes slice {
    0% { top: -80px; }
    100% { top: 40px; }
}

/* Cake split */
.cake-piece {
    display: inline-block;
    transition: 0.6s;
}

.cut .left {
    transform: translateX(-100px) rotate(-15deg);
}

.cut .right {
    transform: translateX(100px) rotate(15deg);
}

/* 🎊 Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- 🔒 LOCK -->
<div id="lockScreen">
    <h2>Enter Password 🎂</h2>
    <input type="password" id="password">
    <button onclick="unlock()">Unlock 🎉</button>
</div>

<!-- 🎉 CONTENT -->
<div id="mainContent">
    <h1>🎂 Happy Birthday 🎂</h1>
    <div class="name">FIDHUUUUU 🎉</div>

    <p>Wishing you an amazing day filled with happiness and joy ✨</p>

    <div class="cake" onclick="cutCake(this)">
        <div class="knife">🔪</div>
        <span class="cake-piece left">🎂</span>
        <span class="cake-piece right">🎂</span>
    </div>
</div>

<script>
// 🔐 Unlock
function unlock() {
    let pass = document.getElementById("password").value;

    if (pass === "1234") {
        lockScreen.style.display = "none";
        mainContent.style.display = "block";
    } else {
        alert("Wrong password 😅");
    }
}

// 🎂 Cut Cake
function cutCake(el) {
    el.classList.add("cut");

    for (let i = 0; i < 80; i++) {
        createConfetti();
    }
}

// 🎊 Confetti
function createConfetti() {
    let c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random()*100 + "vw";
    c.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    c.style.animationDuration = (3 + Math.random()*3) + "s";

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
}
</script>

</body>
</html>
